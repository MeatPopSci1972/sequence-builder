<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SequenceForge — Server Log</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0d1117; --surface:#161b22; --surface2:#1c2330;
    --border:#30363d; --text:#e6edf3; --text2:#8b949e;
    --accent:#00ff9d; --ok:#3fb950; --fail:#f85149; --warn:#d29922;
    --r:4px; --mono:'JetBrains Mono','Fira Code',monospace;
  }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--mono); font-size:13px; }
  header {
    display:flex; align-items:center; gap:12px;
    padding:10px 16px; border-bottom:1px solid var(--border);
    background:var(--surface); position:sticky; top:0; z-index:10;
  }
  .logo { color:var(--accent); font-weight:700; font-size:15px; }
  .logo span { color:var(--text2); font-weight:400; }
  .pill { font-size:11px; padding:2px 8px; border-radius:99px; border:1px solid var(--border); color:var(--text2); }
  .pill.live   { border-color:var(--ok);   color:var(--ok); }
  .pill.paused { border-color:var(--warn); color:var(--warn); }
  .pill.reload { border-color:var(--fail); color:var(--fail); animation:blink .6s step-end infinite; }
  @keyframes blink { 50% { opacity:.3; } }
  .controls { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .controls label { color:var(--text2); font-size:11px; }
  .controls input[type="number"] {
    width:56px; padding:3px 6px; border-radius:var(--r);
    border:1px solid var(--border); background:var(--surface2);
    color:var(--text); font-family:var(--mono); font-size:11px; text-align:center;
  }
  .controls button {
    padding:3px 10px; border-radius:var(--r);
    border:1px solid var(--border); background:transparent;
    color:var(--text2); font-family:var(--mono); font-size:11px; cursor:pointer;
  }
  .controls button:hover { background:var(--surface2); color:var(--text); }
  /* status bar */
  
  #filter-bar {
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
    padding:6px 16px 8px; border-bottom:1px solid var(--border);
    background:var(--surface2); font-size:11px;
  }
  #filter-bar .fb-label { color:var(--dim); font-size:10px; letter-spacing:.06em; text-transform:uppercase; margin-right:2px; }
  .fchip {
    display:inline-flex; align-items:center; gap:4px;
    padding:2px 9px; border-radius:99px; cursor:pointer;
    border:1px solid var(--border); background:var(--surface);
    font-family:var(--mono); font-size:11px; white-space:nowrap;
    color:var(--dim); transition:border-color .12s, color .12s, background .12s;
    user-select:none;
  }
  .fchip.active { border-color:var(--accent); color:var(--accent); background:rgba(0,255,157,.07); }
  .fchip.select-all { border-style:dashed; }
  .sitem.fail { border-color:var(--fail);  color:var(--fail); }
  .sitem.wait { border-color:var(--border); color:var(--text2); }
  .sitem.wait .eye { display:inline-block; animation:eyeballs 2s ease-in-out infinite; }
  @keyframes eyeballs {
    0%,100% { transform:translateX(0) scaleY(1); }
    20%     { transform:translateX(-2px) scaleY(1); }
    40%     { transform:translateX(2px) scaleY(1); }
    60%     { transform:translateX(0) scaleY(0.15); }
    70%     { transform:translateX(0) scaleY(1); }
    85%     { transform:translateX(2px) scaleY(1); }
  }
  .sbar-label { color:var(--text2); font-size:10px; margin-right:4px; }
  #log-list { padding:10px 16px; display:flex; flex-direction:column; gap:6px; }
  .entry { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; animation:slideIn .18s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }
  .entry-head { display:flex; align-items:baseline; gap:10px; padding:6px 10px; border-bottom:1px solid var(--border); background:var(--surface2); }
  .entry-ts { color:var(--text2); font-size:10px; white-space:nowrap; }
  .entry-action { color:var(--accent); font-weight:600; font-size:12px; }
  .entry-body { padding:6px 10px; color:var(--text2); font-size:12px; white-space:pre-wrap; word-break:break-all; line-height:1.5; }
  .entry-body.ok   { color:var(--ok); }
  .entry-body.fail { color:var(--fail); }
  .empty { text-align:center; padding:60px 20px; color:var(--text2); font-size:12px; line-height:2; }
  .empty .dot { color:var(--accent); }
  /* cost-bar */
  #cost-bar { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border-bottom:1px solid var(--border); font-size:11px; }
  .cpanel { background:var(--surface); padding:8px 12px; display:flex; flex-direction:column; gap:3px; }
  .cpanel-title { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text2); margin-bottom:2px; }
  .crow { display:flex; justify-content:space-between; align-items:center; }
  .cval { font-family:monospace; color:var(--text); font-size:11px; }
  .cval.warn { color:var(--warn); }
  .cval.fail { color:var(--fail); }
  .cval.ok   { color:var(--ok); }
  .cval.dim  { color:var(--text2); }
  .clabel { color:var(--text2); font-size:10px; }
  .sparkline { width:100%; height:24px; display:block; margin-top:3px; }
  .sitem { font-size:11px; padding:1px 0; color:var(--text2); }
</style>
</head>
<body>
<header>
  <div class="logo">SequenceForge<span> / server log</span></div>
  <div id="status-pill" class="pill live">● live</div>
  <div class="controls">
    <label for="buf-size">buffer</label>
    <input type="number" id="buf-size" min="10" max="500" value="100">
    <button id="btn-clear">clear</button>
    <button id="btn-pause">pause</button>
    <button id="btn-reload" title="Reload page">↺</button>
  </div>
</header>
<div id="filter-bar"></div>
<div id="cost-bar"></div>
<div id="log-list"></div>

<script>
  var list     = document.getElementById('log-list');
  var pill     = document.getElementById('status-pill');
  var bufInput = document.getElementById('buf-size');
  var btnClear = document.getElementById('btn-clear');
  var btnPause = document.getElementById('btn-pause');
  var btnReload= document.getElementById('btn-reload');

  var paused          = false;
  var localLog        = [];
  var lastTs          = 0;
  var activeFilters   = new Set(); // empty = show all
  var knownActions    = new Set(); // tracks unique action labels seen
  var filterBar       = document.getElementById('filter-bar');
  var pillTimer       = 0;
  var wasOffline      = false;
  var lastLogHtmlMtime = 0;  // 0 until seeded; only reload when BOTH sides > 0

  function fmt(ts) {
    var d = new Date(ts);
    return d.toTimeString().slice(0,8) + '.' + String(d.getMilliseconds()).padStart(3,'0');
  }

  function isOk(result) {
    if (!result) return null;
    var r = result.toLowerCase();
    if (r.includes('fail') || r.includes('error')) return false;
    if (r.includes('ok') || r.includes('pass') || r.startsWith('v0.')) return true;
    return null;
  }

  function buildFilterBar() {
    // Collect all unique action labels from the full log
    var changed = false;
    localLog.forEach(function(e) { if (!knownActions.has(e.action)) { knownActions.add(e.action); changed = true; } });
    if (!changed && filterBar.children.length > 0) return; // nothing new
    filterBar.innerHTML = '';
    if (knownActions.size === 0) return;

    var label = document.createElement('span');
    label.className = 'fb-label';
    label.textContent = 'filter:';
    filterBar.appendChild(label);

    // Select All chip
    var allChip = document.createElement('span');
    allChip.className = 'fchip select-all' + (activeFilters.size === 0 ? ' active' : '');
    allChip.textContent = (activeFilters.size === 0 ? '✓ ' : '') + 'Select All';
    allChip.addEventListener('click', function() {
      activeFilters.clear();
      buildFilterBar();
      render();
    });
    filterBar.appendChild(allChip);

    // One chip per unique action, sorted
    var sorted = Array.from(knownActions).sort();
    sorted.forEach(function(action) {
      var chip = document.createElement('span');
      var isActive = activeFilters.size === 0 || activeFilters.has(action);
      chip.className = 'fchip' + (isActive ? ' active' : '');
      chip.textContent = (isActive ? '✓ ' : '') + action;
      chip.addEventListener('click', function() {
        if (activeFilters.size === 0) {
          // All were shown — switch to single-select: show only this one
          sorted.forEach(function(a) { if (a !== action) activeFilters.add(a); });
          // activeFilters now contains everything EXCEPT action — invert:
          // simpler: rebuild as "all except toggled off"
          // Actually store which are ON: start fresh with only clicked
          activeFilters.clear();
          activeFilters.add(action);
        } else if (activeFilters.has(action)) {
          activeFilters.delete(action);
          if (activeFilters.size === 0) activeFilters.clear(); // back to show-all
        } else {
          activeFilters.add(action);
        }
        buildFilterBar();
        render();
      });
      filterBar.appendChild(chip);
    });
  }

  function render() {
    var max = parseInt(bufInput.value) || 100;
    var filtered = activeFilters.size === 0 ? localLog : localLog.filter(function(e) { return activeFilters.has(e.action); });
    var shown = filtered.slice(0, max);
    if (shown.length === 0) {
      list.innerHTML = '<div class="empty"><div class="dot">◆</div>No events yet.<br>Perform an action to see entries.</div>';
      return;
    }
    list.innerHTML = '';
    shown.forEach(function(e) {
      var ok = isOk(e.result);
      var div = document.createElement('div');
      div.className = 'entry';
      div.innerHTML =
        '<div class="entry-head">'
        + '<span class="entry-ts">' + fmt(e.ts) + '</span>'
        + '<span class="entry-action">' + e.action + '</span>'
        + '</div>'
        + '<div class="entry-body' + (ok===true?' ok':ok===false?' fail':'') + '">'
        + (e.result || '—')
        + '</div>';
      list.appendChild(div);
    });
  }

  function updateStatusBar(entries) {
    var actions = {
      'si-build': { key:'POST /build',    label:'build' },
      'si-lint':  { key:'POST /lint',     label:'lint' },
      'si-snap':  { key:'POST /snapshot', label:'snapshot' },
      'si-git':   { key:'POST /git',      label:'git' }
    };
    Object.keys(actions).forEach(function(id) {
      var el = document.getElementById(id);
      if (!el) return;
      var def = actions[id];
      var hit = null;
      for (var i = 0; i < entries.length; i++) {
        if (entries[i].action === def.key || entries[i].action.indexOf(def.key) === 0) {
          hit = entries[i]; break;
        }
      }
      if (!hit) {
        el.innerHTML = '<span class="eye">👀</span> ' + def.label;
        el.className = 'sitem wait';
      } else {
        var r = (hit.result || '').toLowerCase();
        var failed = r.indexOf('fail') >= 0 || r.indexOf('error') >= 0;
        el.textContent = (failed ? '❌' : '✅') + ' ' + def.label;
        el.className = 'sitem ' + (failed ? 'fail' : 'ok');
      }
    });
  }

  function updatePill() {
    fetch('/status').then(function(r){return r.json();}).then(function(s){
      var v = s.version || '';
      var clean = s.git && s.git.clean;
      var lastMsg = s.git && s.git.lastCommit ? s.git.lastCommit : '';
      var tag = (clean && lastMsg.indexOf(v) >= 0) ? 'SNAPSHOT' : 'LATEST';
      pill.textContent = '● ' + v + ' ' + tag;
      pill.className = 'pill live';
    }).catch(function(){});
  }

  function poll() {
    if (paused) return;
    fetch('/log')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.entries.length > 0 && data.entries[0].ts !== lastTs) {
          lastTs = data.entries[0].ts;
          localLog = data.entries;
          buildFilterBar();
          render();
        }
        // Auto-reload when log.html changes on server
        // SAFE GUARD: only reload when BOTH sides have real timestamps (> 0)
        // This prevents the crash loop where server restart sets mtime to 0
        if (data.logHtmlMtime > 0 && lastLogHtmlMtime === 0) {
          lastLogHtmlMtime = data.logHtmlMtime;  // seed — no reload
        } else if (data.logHtmlMtime > 0 && lastLogHtmlMtime > 0 && data.logHtmlMtime !== lastLogHtmlMtime) {
          lastLogHtmlMtime = data.logHtmlMtime;
          pill.textContent = '↺ updating...';
          pill.className = 'pill reload';
          setTimeout(function(){ location.reload(); }, 600);
          return;
        }

        // Handle reconnect after offline
        if (wasOffline) {
          wasOffline = false;
          // Don't auto-reload on reconnect — just update pill
        }

        // Update version pill every 10s
        if (Date.now() - pillTimer > 10000) { pillTimer = Date.now(); updatePill(); }

        pill.textContent = pill.textContent.includes('●') ? pill.textContent : '● live';
        if (!pill.textContent.includes('updating')) pill.className = 'pill live';
      })
      .catch(function() {
        if (!wasOffline) {
          wasOffline = true;
          pill.textContent = '○ offline';
          pill.className = 'pill paused';
        }
      });
  }

  btnClear.addEventListener('click', function() { localLog = []; lastTs = 0; render(); });
  btnPause.addEventListener('click', function() {
    paused = !paused;
    btnPause.textContent = paused ? 'resume' : 'pause';
    pill.textContent = paused ? '◌ paused' : '● live';
    pill.className = paused ? 'pill paused' : 'pill live';
  });
  btnReload.addEventListener('click', function() { location.reload(); });
  bufInput.addEventListener('change', render);

  updatePill();
  poll();
  setInterval(poll, 2000);

  // ── Session Cost abstraction ──────────────────────────────────────────
  var costBar = document.getElementById("cost-bar");

  function computeCost(entries) {
    var patchHit = 0, patchMiss = 0, putCount = 0;
    var builds = 0, lints = 0, tests = 0, commits = 0, snaps = 0;
    entries.forEach(function(e) {
      var a = e.action || "", r = (e.result || "").toLowerCase();
      if (a.indexOf("POST /patch") !== -1) {
        if (r.indexOf("miss:") !== -1) patchMiss++;
        else if (r.indexOf("ok:") !== -1) patchHit++;
      }
      if (a.indexOf("PUT /") !== -1) putCount++;
      if (a.indexOf("POST /build") !== -1) builds++;
      if (a.indexOf("POST /lint") !== -1) lints++;
      if (a.indexOf("GET /test") !== -1) tests++;
      if (a.indexOf("POST /git") !== -1 && a.indexOf("git-log") == -1) commits++;
      if (a.indexOf("POST /snapshot") !== -1) snaps++;
    });
    var totalPatches = patchHit + patchMiss;
    var missRate = totalPatches > 0 ? Math.round(patchMiss / totalPatches * 100) : 0;
    return { patchHit:patchHit, patchMiss:patchMiss, putCount:putCount,
             totalPatches:totalPatches, missRate:missRate,
             builds:builds, lints:lints, tests:tests, commits:commits, snaps:snaps };
  }

  function sparklineSVG(entries, buckets) {
    if (entries.length < 2) return "";
    var n = buckets || 16;
    var tMin = entries[entries.length-1].ts, tMax = entries[0].ts;
    var span = Math.max(tMax - tMin, 1);
    var slots = [];
    for (var i = 0; i < n; i++) slots.push({ hit:0, miss:0 });
    entries.forEach(function(e) {
      var a = e.action || "", r = (e.result || "").toLowerCase();
      if (a.indexOf("POST /patch") == -1) return;
      var bi = Math.min(n-1, Math.floor((e.ts - tMin) / span * n));
      if (r.indexOf("miss:") !== -1) slots[bi].miss++;
      else if (r.indexOf("ok:") !== -1) slots[bi].hit++;
    });
    var W = 200, H = 24, bw = W/n;
    var bars = "";
    slots.forEach(function(s, i) {
      var total = s.hit + s.miss;
      if (total == 0) return;
      var rate = s.miss / total;
      var bh = Math.max(2, Math.round(rate * H));
      var col = rate > 0.5 ? "var(--fail)" : rate > 0.2 ? "var(--warn)" : "var(--ok)";
      var x = Math.round(i * bw);
      bars += "<rect x=\"" + x + "\" y=\"" + (H-bh) + "\" width=\"" + Math.max(1,Math.round(bw)-1) + "\" height=\"" + bh + "\" fill=\"" + col + "\"/>";
    });
    return "<svg class=\"sparkline\" viewBox=\"0 0 " + W + " " + H + "\" preserveAspectRatio=\"none\">" + bars + "</svg>";
  }

  function missClass(rate) {
    if (rate > 50) return "fail";
    if (rate > 20) return "warn";
    if (rate > 0)  return "dim";
    return "ok";
  }

  function renderCostBar(entries) {
    if (!costBar) return;
    var c = computeCost(entries);
    var spark = sparklineSVG(entries, 16);
    // Last build/lint/test/git status from entries
    function lastOf(action) {
      for (var i = 0; i < entries.length; i++) {
        if (entries[i].action && entries[i].action.indexOf(action) !== -1) return entries[i];
      }
      return null;
    }
    function si(action, label) {
      var e = lastOf(action);
      if (!e) return "<div class=\"crow\"><span class=\"clabel\">" + label + "</span><span class=\"cval dim\">—</span></div>";
      var ok = isOk(e.result);
      var cls = ok == true ? "ok" : ok == false ? "fail" : "dim";
      var icon = ok == true ? "✅" : ok == false ? "❌" : "👀";
      return "<div class=\"crow\"><span class=\"clabel\">" + label + "</span><span class=\"cval " + cls + "\">" + icon + "</span></div>";
    }
    var statusHtml =
      "<div class=\"cpanel\">" +
      "<div class=\"cpanel-title\">Status</div>" +
      si("POST /build", "build") +
      si("POST /lint", "lint") +
      si("GET /test", "test") +
      si("POST /git", "commit") +
      si("POST /snapshot", "snapshot") +
      "</div>";
    var missRateClass = missClass(c.missRate);
    var costHtml =
      "<div class=\"cpanel\">" +
      "<div class=\"cpanel-title\">Session Cost</div>" +
      "<div class=\"crow\"><span class=\"clabel\">patches</span><span class=\"cval\">" + c.totalPatches + "</span></div>" +
      "<div class=\"crow\"><span class=\"clabel\">misses</span><span class=\"cval " + missRateClass + "\">" + c.patchMiss + " (" + c.missRate + "%)</span></div>" +
      "<div class=\"crow\"><span class=\"clabel\">puts</span><span class=\"cval\">" + c.putCount + "</span></div>" +
      spark +
      "</div>";
    costBar.innerHTML = statusHtml + costHtml;
  }

  // Wire into existing render() — call renderCostBar after render
  var _origRender = render;
  render = function() { _origRender(); renderCostBar(localLog); };

</script>
</body>
</html>
