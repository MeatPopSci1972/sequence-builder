<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SequenceForge Canary Tests</title>
<style>
  :root { --pass:#4af07a; --fail:#f07a4a; --bg:#1a1a2e; --surface:#16213e; --text:#e0e0e0; --accent:#7b61ff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font: 14px/1.5 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; }
  header { background: var(--surface); padding: 12px 20px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 16px; font-weight: 600; color: var(--accent); }
  header span { font-size: 12px; color: #888; }
  button#rerun { margin-left: auto; background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
  button#rerun:hover { opacity: 0.85; }
  #layout { display: flex; flex: 1; overflow: hidden; }
  #results-pane { width: 380px; min-width: 280px; background: var(--surface); border-right: 1px solid #333; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
  #canary-summary { padding: 10px 14px; border-radius: 8px; font-weight: 700; font-size: 14px; text-align: center; }
  #canary-summary.all-pass { background: #1a3a2a; color: var(--pass); }
  #canary-summary.has-fail { background: #3a1a1a; color: var(--fail); }
  #canary-summary:empty { display: none; }
  #canary-log { display: flex; flex-direction: column; gap: 4px; }
  #canary-log .row { padding: 6px 10px; border-radius: 6px; font-size: 12px; font-family: 'Cascadia Code', 'Fira Mono', monospace; white-space: pre-wrap; word-break: break-all; }
  #canary-log .row.pass { background: #1a2e22; color: var(--pass); }
  #canary-log .row.fail { background: #2e1a1a; color: var(--fail); }
  #frame-pane { flex: 1; display: flex; flex-direction: column; }
  #frame-label { background: #111; color: #555; font-size: 11px; padding: 4px 12px; border-bottom: 1px solid #222; }
  #canary-frame { flex: 1; border: none; background: #fff; }
  #running-indicator { padding: 10px 14px; border-radius: 8px; background: #1a1a3a; color: var(--accent); font-weight: 600; font-size: 13px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>SequenceForge &mdash; Canary Tests</h1>
  <span>Browser smoke suite &bull; Not a release gate &bull; Run against new Chrome versions</span>
  <button id="rerun" onclick="location.reload()">&#8635; Re-run</button>
</header>
<div id="layout">
  <div id="results-pane">
    <div id="running-indicator">Running&hellip;</div>
    <div id="canary-summary"></div>
    <div id="canary-log"></div>
  </div>
  <div id="frame-pane">
    <div id="frame-label">sequence-builder.html (live)</div>
    <iframe id="canary-frame" title="SequenceForge under test"></iframe>
  </div>
</div>
<script src="/sequence-builder.canary.js"></script>
<script>
  // Hide running indicator once summary appears
  const observer = new MutationObserver(() => {
    const s = document.getElementById('canary-summary');
    if (s && s.textContent.trim()) {
      document.getElementById('running-indicator').style.display = 'none';
    }
  });
  observer.observe(document.getElementById('canary-summary'), { childList: true, characterData: true, subtree: true });
</script>
</body>
</html>
